name: Build Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rust-yt-dlp-windows-x64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rust-yt-dlp-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rust-yt-dlp-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rust-yt-dlp-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/rust-yt-dlp.exe" "artifacts/${{ matrix.artifact_name }}"
          else
            cp "target/${{ matrix.target }}/release/rust-yt-dlp" "artifacts/${{ matrix.artifact_name }}"
            chmod +x "artifacts/${{ matrix.artifact_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.artifact_name }}